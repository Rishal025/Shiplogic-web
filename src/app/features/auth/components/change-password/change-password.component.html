<div class="w-full">
  <div class="text-center mb-6 sm:mb-8">
    <h2 class="text-2xl sm:text-3xl font-bold text-slate-900 mb-2">Change Password</h2>
    <p class="text-sm sm:text-base text-slate-500">Update your temporary password to continue into the shipment portal.</p>
  </div>

  <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 p-5 sm:p-8">
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6">
      <div class="space-y-2">
        <label class="block text-sm font-semibold text-slate-700">Current Password</label>
        <input type="password" formControlName="currentPassword" class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl text-sm" />
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-semibold text-slate-700">New Password</label>
        <input type="password" formControlName="newPassword" class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl text-sm" />
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-semibold text-slate-700">Confirm Password</label>
        <input type="password" formControlName="confirmPassword" class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl text-sm" />
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="w-full py-3.5 px-6 bg-linear-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-bold rounded-xl shadow-lg shadow-blue-500/30 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
        {{ loading ? 'Updating...' : 'Update Password' }}
      </button>
    </form>
  </div>
</div>
