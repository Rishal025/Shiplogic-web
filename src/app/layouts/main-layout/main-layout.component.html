<div class="layout-shell" [class.is-sidebar-collapsed]="isSidebarCollapsed">
  <aside class="sidebar-pane">
    <app-sidebar [collapsed]="isSidebarCollapsed" (toggleCollapse)="toggleSidebar()"></app-sidebar>
  </aside>

  <div class="content-shell">
    <header class="topbar-pane">
      <app-navbar></app-navbar>
    </header>

    <main class="content-pane custom-scrollbar">
      <div class="max-w-[1600px] mx-auto p-4 md:p-6 lg:p-10">
         <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
