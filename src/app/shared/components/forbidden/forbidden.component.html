<div class="min-h-screen bg-linear-to-br from-slate-50 via-white to-slate-50 flex items-center justify-center px-4 py-8">
  <div class="max-w-md w-full text-center">
    <!-- Minimalistic Error Display -->
    <div class="mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-100 mb-4">
        <i class="pi pi-ban text-red-600 text-2xl"></i>
      </div>
      <h1 class="text-6xl sm:text-7xl font-black text-slate-900 mb-2">403</h1>
      <p class="text-base sm:text-lg font-semibold text-slate-700 mb-2">Access Denied</p>
      <p class="text-sm text-slate-500 max-w-sm mx-auto">
        You don't have permission to access this resource.
      </p>
    </div>

    <!-- Action Buttons -->
    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <button 
        routerLink="/dashboard"
        class="inline-flex items-center justify-center px-5 py-2.5 rounded-lg bg-blue-600 text-white text-sm font-semibold hover:bg-blue-700 transition-colors shadow-sm">
        <i class="pi pi-home mr-2 text-xs"></i>
        <span>Dashboard</span>
      </button>
      <button 
        (click)="goBack()"
        class="inline-flex items-center justify-center px-5 py-2.5 rounded-lg bg-white text-slate-700 text-sm font-semibold hover:bg-slate-50 transition-colors border border-slate-200">
        <i class="pi pi-arrow-left mr-2 text-xs"></i>
        <span>Go Back</span>
      </button>
    </div>

    <!-- Footer -->
    <p class="mt-8 text-xs text-slate-400">
      Need access? Contact your administrator.
    </p>
  </div>
</div>
