<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 40" fill="none">
  <!-- Hull -->
  <path d="M4 26 L8 34 L56 34 L60 26 Z" fill="#1e40af" rx="2"/>
  <!-- Hull highlight -->
  <path d="M8 34 L56 34 L58 30 L6 30 Z" fill="#1d4ed8"/>
  <!-- Main deck -->
  <rect x="10" y="20" width="44" height="6" rx="1" fill="#2563eb"/>
  <!-- Bridge/cabin -->
  <rect x="28" y="10" width="16" height="10" rx="2" fill="#3b82f6"/>
  <!-- Bridge windows -->
  <rect x="30" y="12" width="4" height="3" rx="0.5" fill="#bfdbfe"/>
  <rect x="36" y="12" width="4" height="3" rx="0.5" fill="#bfdbfe"/>
  <rect x="42" y="12" width="2" height="3" rx="0.5" fill="#bfdbfe"/>
  <!-- Funnel -->
  <rect x="32" y="4" width="6" height="8" rx="1" fill="#1e3a8a"/>
  <!-- Funnel stripe -->
  <rect x="32" y="8" width="6" height="2" fill="#ef4444"/>
  <!-- Smoke puff 1 -->
  <circle cx="35" cy="2" r="2" fill="#94a3b8" opacity="0.6"/>
  <circle cx="37" cy="1" r="1.5" fill="#94a3b8" opacity="0.4"/>
  <!-- Cargo containers on deck -->
  <rect x="12" y="16" width="8" height="4" rx="0.5" fill="#dc2626"/>
  <rect x="21" y="16" width="6" height="4" rx="0.5" fill="#16a34a"/>
  <!-- Anchor chain hint -->
  <circle cx="10" cy="28" r="1.5" fill="#93c5fd"/>
  <!-- Wake lines -->
  <path d="M2 36 Q8 34 14 36" stroke="#93c5fd" stroke-width="1" fill="none" opacity="0.7"/>
  <path d="M2 38 Q10 36 18 38" stroke="#bfdbfe" stroke-width="0.8" fill="none" opacity="0.5"/>
</svg>
